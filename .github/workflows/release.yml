# CI/CD — ZodHub Pulse (release multiplataforma)
#
# Qué hace: al empujar un tag `v*` compila la app para macOS y Windows y publica
# UNA SOLA Release de GitHub (en borrador) con todos los instaladores y el
# `latest.json` que alimenta las actualizaciones automáticas de ambos sistemas.
#
#   macOS   → .dmg UNIVERSAL (Intel x86_64 + Apple Silicon aarch64)
#   Windows → instalador NSIS (.exe) + .msi
#
# Cómo se combinan las dos plataformas en un único `latest.json`:
# los dos jobs apuntan al MISMO `tagName`. El primero que termina crea la
# Release y sube su `latest.json`; el segundo encuentra esa Release, lee el
# archivo existente y AÑADE su plataforma en vez de sobrescribirlo. Por eso es
# imprescindible que `tagName`, `releaseName` y `releaseDraft` sean idénticos en
# los dos, y que `fail-fast` esté desactivado (si uno falla, el otro debe
# terminar igualmente para no dejar una release a medias sin avisar).
#
# SIN FIRMA DE CÓDIGO todavía:
#   - macOS: el .dmg no está notarizado → la primera vez, botón derecho > Abrir.
#   - Windows: el instalador no lleva certificado → SmartScreen avisará
#     («Más información» → «Ejecutar de todas formas»).
# Ambos casos están explicados en la web de descargas. Los bloques de firma de
# Apple quedan preparados abajo para cuando haya cuenta de desarrollador.
name: release

on:
  push:
    tags:
      - "v*" # se dispara al empujar un tag como v0.2.0
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

# Permiso para que la acción pueda crear la Release y subir binarios.
permissions:
  contents: write

jobs:
  release:
    strategy:
      # Nunca cancelar la otra plataforma si una falla: preferimos una release
      # incompleta y visible a una cancelada a medias.
      fail-fast: false
      # DE UNO EN UNO, a propósito. Si los dos jobs arrancaran a la vez podrían
      # intentar crear la misma Release simultáneamente y duplicarla, o pisarse
      # el `latest.json` al subirlo. Secuencial, el segundo siempre encuentra el
      # trabajo del primero y le añade su plataforma. Tarda más (la suma en vez
      # del máximo), pero una release se publica una vez: importa que salga bien.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            label: macOS (universal)
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            label: Windows
            args: ""
            rust-targets: ""

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v7

      - name: Configurar Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm # cachea ~/.npm según package-lock.json

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # En macOS hacen falta las dos arquitecturas para el binario universal.
          targets: ${{ matrix.rust-targets }}

      - name: Caché de Rust (acelera compilaciones sucesivas)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instalar dependencias JS
        run: npm ci

      # Compila el frontend (beforeBuildCommand: npm run build) y el binario
      # Rust, ensambla los instaladores y los sube a la Release.
      - name: Build + Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- FIRMA DEL UPDATER (obligatoria para las actualizaciones) ---
          # Clave generada con `npm run tauri signer generate`. La privada va como
          # secret; la pública ya está en tauri.conf.json (plugins.updater.pubkey).
          # Con esto, tauri-action firma los artefactos y genera/sube `latest.json`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- FIRMA / NOTARIZACIÓN APPLE (dejar comentado hasta tener Developer ID) ---
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}                 # .p12 en base64
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}       # "Developer ID Application: Nombre (TEAMID)"
          # APPLE_ID: ${{ secrets.APPLE_ID }}                                   # correo de la cuenta de desarrollador
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                       # contraseña específica de app (notarización)
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}                         # Team ID de 10 caracteres
        with:
          # Estos tres valores DEBEN coincidir en ambos jobs: así el segundo
          # encuentra la release del primero en vez de crear otra.
          tagName: ${{ github.ref_name }}
          releaseName: "ZodHub Pulse ${{ github.ref_name }}"
          releaseDraft: true # borrador, para revisar antes de publicar
          prerelease: false
          releaseBody: |
            Mantenimiento honesto para Mac y Windows. Local-first, sin telemetría, gratis.

            ## Descargas

            | Sistema | Archivo |
            | --- | --- |
            | macOS 12 o superior (Intel y Apple Silicon) | `.dmg` |
            | Windows 10 y 11 (64 bits) | `-setup.exe` (recomendado) o `.msi` |

            ## Primera instalación

            Todavía no firmamos con certificado, así que el sistema avisará una vez:

            - **macOS**: botón derecho sobre la app → *Abrir* → *Abrir*.
            - **Windows**: *Más información* → *Ejecutar de todas formas*.

            A partir de ahí la app se actualiza sola: te avisa con un indicador
            en la campana de la barra superior y se instala con un clic.

            Puedes revisar el código en este mismo repositorio para comprobar
            qué hace el programa antes de fiarte de él.
          # NSIS (.exe) para el actualizador de Windows: instala en modo pasivo,
          # sin pedirle nada al usuario. El .msi sigue publicándose como
          # alternativa para quien despliegue por directiva de grupo.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────────────────────────────────
  # PORTERO. No se publica nada sin pasar por aquí.
  #
  # Por qué existe: en la v0.2.2 se publicó una release cuyo `latest.json`
  # llevaba la firma de un build ANTERIOR, mientras los binarios eran del build
  # nuevo. Todo parecía correcto —archivos presentes, tamaños normales, CI en
  # verde— y sin embargo la actualización automática era imposible: la app
  # descargaba, comprobaba la firma, no cuadraba y abortaba. Se detectó desde
  # fuera, a mano, después de publicar.
  #
  # Qué comprueba: que la firma incrustada en `latest.json` (la que el
  # actualizador verifica de verdad) sea EXACTAMENTE la del `.sig` del archivo
  # al que apunta. Si no coinciden, el job falla y la release se queda en
  # borrador, sin publicar.
  verificar-firmas:
    name: Verificar firmas antes de publicar
    needs: release
    runs-on: ubuntu-latest
    permissions:
      # `write` y no `read`: las releases en BORRADOR solo son visibles para
      # quien tiene permiso de escritura. Con `read` la API las oculta.
      contents: write
    steps:
      # OJO: no se puede usar `gh release download <tag>`. La release está en
      # borrador y GitHub NO resuelve los borradores por su tag —el endpoint
      # /releases/tags/<tag> devuelve 404 hasta que se publican—. Hay que
      # localizarla por su ID en el listado y bajar los adjuntos uno a uno.
      - name: Descargar los artefactos de la release (borrador)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p art

          ID=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
                 --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -1)
          if [ -z "$ID" ]; then
            echo "No existe ninguna release (ni borrador) para el tag $TAG."
            exit 1
          fi
          echo "Release $TAG encontrada, id $ID"

          gh api "repos/$GITHUB_REPOSITORY/releases/$ID/assets" --paginate \
            --jq '.[] | "\(.id)\t\(.name)"' > lista.tsv
          if [ ! -s lista.tsv ]; then
            echo "La release no tiene ningun archivo adjunto."
            exit 1
          fi

          while IFS=$'\t' read -r aid nombre; do
            echo "  bajando $nombre"
            gh api -H "Accept: application/octet-stream" \
              "repos/$GITHUB_REPOSITORY/releases/assets/$aid" > "art/$nombre"
          done < lista.tsv

          echo
          ls -la art

      - name: La firma del latest.json debe ser la del archivo publicado
        run: |
          python3 - <<'PY'
          import json, os, sys

          data = json.load(open("art/latest.json"))
          print(f"latest.json declara la version {data['version']}\n")

          fallos = []
          for plataforma, info in data["platforms"].items():
              archivo = os.path.basename(info["url"])
              sig = os.path.join("art", archivo + ".sig")

              if not os.path.exists(os.path.join("art", archivo)):
                  fallos.append(f"{plataforma}: apunta a {archivo}, que NO esta en la release")
                  continue
              if not os.path.exists(sig):
                  fallos.append(f"{plataforma}: falta {archivo}.sig")
                  continue

              esperada = open(sig).read().strip()
              declarada = info["signature"].strip()
              if esperada == declarada:
                  print(f"  OK    {plataforma:24} {archivo}")
              else:
                  print(f"  FALLA {plataforma:24} {archivo}")
                  fallos.append(
                      f"{plataforma}: la firma de latest.json no es la de {archivo}.sig "
                      "(mezcla de dos compilaciones)"
                  )

          if fallos:
              print("\nNO SE PUEDE PUBLICAR:")
              for f in fallos:
                  print("  - " + f)
              print("\nBorra la release y el tag y vuelve a lanzarlo desde cero:")
              print("  gh release delete <tag> --yes && git push --delete origin <tag>")
              sys.exit(1)

          print("\nTodas las firmas corresponden a sus archivos.")
          PY
